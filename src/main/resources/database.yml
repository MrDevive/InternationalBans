# database.yml - Настройки базы данных
# ============================================================
# ВНИМАНИЕ: После изменения параметров требуется перезагрузка плагина!
# ============================================================

# ============================================================
# НАСТРОЙКИ MYSQL
# ============================================================
mysql:
  # Включение MySQL
  # true - использовать MySQL базу данных
  # false - использовать YAML файловое хранилище
  enabled: false

  # ===== ОСНОВНЫЕ НАСТРОЙКИ ПОДКЛЮЧЕНИЯ =====

  # IP-адрес или домен сервера базы данных
  # "localhost" - если БД на том же сервере
  # "127.0.0.1" - локальный IP
  # "192.168.1.100" - IP в локальной сети
  # "example.com" - доменное имя
  host: "127.0.0.1"

  # Порт MySQL сервера
  # 3306 - стандартный порт MySQL
  # 3307 - альтернативный порт
  port: 3306

  # Название базы данных (должна существовать)
  # База данных должна быть создана заранее
  # Рекомендуется создать отдельную БД для плагина
  database: "database_name"

  # Имя пользователя для подключения к БД
  # "root" - администратор (не рекомендуется для продакшена)
  # "international_bans" - лучше создать отдельного пользователя
  username: "root"

  # Пароль пользователя БД
  # Оставьте пустым если пароль не требуется
  # В продакшене обязательно используйте сложный пароль
  password: ""

  # ===== НАСТРОЙКИ SSL =====

  # Использовать SSL шифрование для подключения
  # true - включить SSL (рекомендуется для безопасности)
  # false - отключить SSL (только для локальной сети)
  use-ssl: false

  # Разрешить автоматическую загрузку публичного ключа
  # true - автоматически загружать ключ (рекомендуется)
  # false - отключить (может вызвать ошибки подключения)
  allow-public-key-retrieval: true

  # ===== НАСТРОЙКИ ПУЛА СОЕДИНЕНИЙ (HikariCP) =====

  pool:
    # Максимальный размер пула соединений
    # 1-100 - количество одновременных подключений к БД
    # Рекомендуется: 10-20 для большинства серверов
    max-pool-size: 10

    # Минимальное количество idle соединений в пуле
    # 1-10 - всегда держать активными
    # Рекомендуется: 2-5
    min-idle: 2

    # Таймаут подключения (миллисекунды)
    # 10000-60000 - время ожидания ответа от БД
    # При превышении - ошибка подключения
    connection-timeout: 30000

    # Время жизни idle соединения (миллисекунды)
    # 600000 = 10 минут
    # Соединение будет закрыто через это время бездействия
    idle-timeout: 600000

    # Максимальное время жизни соединения (миллисекунды)
    # 1800000 = 30 минут
    # После этого времени соединение будет пересоздано
    max-lifetime: 1800000

  # ===== НАСТРОЙКИ ТАБЛИЦ =====

  # Префикс для таблиц в базе данных
  # Позволяет использовать разные префиксы для разных серверов
  # Пример: "international_bans" -> таблица будет "international_bans_punishments"
  table-prefix: "international_bans"