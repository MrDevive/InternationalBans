# InternationalBans - Основной конфигурационный файл
# Версия: 1.1.0

# ============================================================
# НАСТРОЙКИ НАКАЗАНИЙ
# ============================================================
settings:
  # Максимальное количество предупреждений до автоматического бана
  # 0 - автоматический бан отключён
  # 1-100 - количество варнов после которых игрок будет забанен
  max-warnings: 3
  
  # Автоматический бан после превышения лимита предупреждений
  # true - включено (игрок будет забанен после max-warnings)
  # false - выключено (предупреждения не приводят к бану)
  auto-ban-after-warnings: true
  
  # Длительность автоматического бана (в миллисекундах)
  # -1 - бан навсегда
  # 3600000 - 1 час
  # 86400000 - 1 день
  # 604800000 - 1 неделя
  auto-ban-duration: -1
  
  # Текст причины для автоматического бана
  # Поддерживает цвета через & (например &c - красный)
  auto-ban-reason: "Превышение лимита предупреждений"

# ============================================================
# НАСТРОЙКИ БАНОВ
# ============================================================
ban:
  # Сохранять ли IP адрес при выдаче бана
  # true - IP будет сохранён в базу данных (нужно для IP банов)
  # false - IP не сохраняется
  save-ip-on-ban: true
  
  # Банить ли все аккаунты с этим IP адресом
  # true - при бане игрока, все аккаунты с его IP будут также забанены
  # false - банится только конкретный игрок
  ban-all-accounts: true

# ============================================================
# НАСТРОЙКИ IP-БАНОВ
# ============================================================
ip-ban:
  # Сообщение, которое видят игроки при бане всех аккаунтов с IP
  # Поддерживает цвета через &
  ban-all-accounts-message: "&cВаш IP-адрес был заблокирован"

# ============================================================
# НАСТРОЙКИ ИСТОРИИ НАКАЗАНИЙ
# ============================================================
history:
  # Максимальное количество записей для отображения в /history
  # 1-1000 - ограничение вывода
  # Рекомендуется: 50-100 для производительности
  max-entries: 50
  
  # Сортировка наказаний в истории
  # "newest_first" - сначала новые (сверху последние наказания)
  # "oldest_first" - сначала старые (сверху первые наказания)
  sort-order: "newest_first"

# ============================================================
# НАСТРОЙКИ БАЗЫ ДАННЫХ
# ============================================================
database:
  # Тип базы данных
  # "mysql" - MySQL база данных (рекомендуется для больших серверов)
  # "yaml" - файловое хранилище (для маленьких серверов)
  type: yaml
  
  # Интервал автосохранения в тиках (20 тиков = 1 секунда)
  # 6000 тиков = 5 минут
  # 12000 тиков = 10 минут
  # Рекомендуется: 6000-12000 для баланса производительности
  auto-save-interval: 6000

# ============================================================
# НАСТРОЙКИ КОМАНД
# ============================================================
command-settings:
  # Требовать ли подтверждение при перезагрузке плагина
  # true - нужно ввести /reload confirm для перезагрузки
  # false - перезагрузка происходит сразу
  require-confirm-reload: false
  
  # Задержка между перезагрузками (в секундах)
  # 0 - отключено
  # 1-600 - время ожидания между перезагрузками
  # Защита от случайных или частых перезагрузок
  reload-cooldown: 5